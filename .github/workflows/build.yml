name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyinstaller
      - run: pyinstaller --onefile --windowed --name TrainzMeshGUI trainz_mesh_gui.py
      - run: copy TrainzMeshImporter.exe dist\TrainzMeshImporter.exe
      - uses: actions/upload-artifact@v4
        with:
          name: TrainzMeshGUI-windows
          path: dist\
